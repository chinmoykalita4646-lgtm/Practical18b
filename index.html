<html>
  <head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="Practical18b.css">
  </head>
  <body>
    <!-- Header section -->
    <div class="header">
      <h3>Chinmoy Kalita</h3>
      <h2>Registration Form</h2>
    </div>

    <!-- Content section -->
    <div class="content">
      <div class="regForm">
        <fieldset>
          <legend>Registration Form</legend>
          <form>
            <div class="userName">
              <label for="name">Name</label>
              <input type="text" id="name" placeholder="Enter your name" />
            </div>
            <div class="emailID">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                placeholder="Enter your Email ID"
              />
            </div>
            <div class="address">
              <label for="address">Address</label>
              <textarea
                name="address"
                id="address"
                placeholder="Enter your address"
              ></textarea>
            </div>
            <div class="DOB">
              <label for="DOB">DOB</label>
              <input type="date" name="DOB" id="DOB"/>
            </div>
            <div class="age">
              <label for="age">Age</label>
              <input type="number" name="age" id="age" placeholder="Enter your age"/>
            </div>
            <div class="phNumber">
              <label for="number">Number</label>
              <input type="text" id="number" placeholder="Enter your number" />
            </div>
            <div class="passWord">
              <label for="password">Password</label>
              <input type="password" name="pass" id="password" placeholder="Enter your password"/>
            </div>
            <div class="gender">
              <label for="gender">Gender</label>
              <input type="radio" name="gender" id="male"/> Male
              <input type="radio" name="gender" id="female"/> Female
            </div>
            <div class="hobbies">
              <label for="hobbies">Hobbies</label>
              <input type="checkbox" name="chess" id="chess"/> Chess
              <input type="checkbox" name="drawing" id="drawing"/> Drawing
              <input type="checkbox" name="gaming" id="gaming"/> Gaming
            </div>
            <div class="fileInput">
              <label for="file">File</label>
              <input type="file" name="file" id="file"/>
            </div>
            <div class="SubRe">
              <input type="submit" value="Submit" onclick="return validation()"/>
              <input type="reset" value="Reset"/>
            </div>
            <div class="SignIn">
              <h3>
                Already have an account? <a href="practical12.html">Sign in</a>
              </h3>
            </div>
          </form>
        </fieldset>
      </div>
      <div class="Validation">
        <script>
          function validation(){
            let userN = document.getElementById("name").value;
            let Email = document.getElementById("email").value;
            let add = document.getElementById("address").value;
            let DoB = document.getElementById("DOB").value;
            let age = document.getElementById("age").value;
            let passW = document.getElementById("password").value;
            let ph_Num = document.getElementById("number").value;

            // Check for empty fields
            if(userN == "" || email == "" || add == "" || DoB == "" || age == "" || passW == "" || ph_Num == ""){
              alert("Please don't leave fields empty!");
              return false;
            }

            // Regex pattern
            let namePattern = /^[A-Za-z0-9]{3,}$/;
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let passwordPattern = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9]).{8,}$/;
            let numberPattern = /^[0-9]{10}$/;

            // Name validation
            if (!namePattern.test(userN)) {
              alert("Name must contain only letters or numbers and at least 3 characters!");
              return false;
            }

            // Email validation
            if (!emailPattern.test(Email)) {
              alert("Enter a valid email!");
              return false;
            }

            // Age validation
            if (age < 1 || age > 120) {
              alert("Enter a valid age between 1 and 120");
              return false;
            }

            // Phone validation
            if (!numberPattern.test(ph_Num)) {
              alert("Enter correct phone number!");
              return false;
            }

            // Password validation
            if (!passwordPattern.test(passW)) {
              alert("Password must have at least 8 characters, including uppercase, lowercase, and a number");
              return false;
            }

            // If all valid
            else{
              alert("Form submitted successfully!");
              return true;
            }
          }
        </script>
      </div>
    </div>

    <!-- Footer section -->
    <div class="footer">&copy;Chinmoy </div>
  </body>
</html>
